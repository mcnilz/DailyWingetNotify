name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag, for example v1.0.0
        required: true
        type: string

permissions:
  contents: write

env:
  DOTNET_VERSION: 10.0.x
  PROJECT_PATH: src/DailyWingetNotify/DailyWingetNotify.csproj
  RUNTIME_IDENTIFIER: win-x64

jobs:
  release:
    name: Publish GitHub release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish Native AOT
        run: dotnet publish $env:PROJECT_PATH -c Release -r $env:RUNTIME_IDENTIFIER --self-contained true

      - name: Collect executable
        shell: pwsh
        run: |
          $publishDir = Join-Path "src/DailyWingetNotify/bin/Release/net10.0-windows/$env:RUNTIME_IDENTIFIER" "publish"
          $exePath = Join-Path $publishDir "DailyWingetNotify.exe"
          if (-not (Test-Path $exePath)) {
            throw "Published executable not found at $exePath"
          }

          New-Item -ItemType Directory -Force artifacts | Out-Null
          Copy-Item $exePath "artifacts/DailyWingetNotify.exe"

      - name: Create or update release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG_NAME: ${{ inputs.tag_name }}
        run: |
          $tagName = if ($env:INPUT_TAG_NAME) { $env:INPUT_TAG_NAME } else { $env:GITHUB_REF_NAME }
          if (-not $tagName) {
            throw "Release tag is required."
          }

          $assetPath = "artifacts/DailyWingetNotify.exe"
          if (gh release view $tagName --repo $env:GITHUB_REPOSITORY 2>$null) {
            gh release upload $tagName $assetPath --repo $env:GITHUB_REPOSITORY --clobber
          } else {
            gh release create $tagName $assetPath --repo $env:GITHUB_REPOSITORY --target $env:GITHUB_SHA --title $tagName --notes "DailyWingetNotify $tagName"
          }
